[platformio]
default_envs = esp32-p4
build_dir = .pio/build_p4

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
framework = arduino
build_type = release
extra_scripts = pre:enable_ccache.py
upload_protocol = esptool
monitor_speed = 115200
monitor_filters =
	default
	esp32_exception_decoder
lib_ldf_mode = chain ; deep+
; board_build.filesystem = littlefs
lib_deps =
;	https://github.com/FastLED/FastLED.git
;   FastLED
	https://github.com/FastLED/FastLED#0a4ff478a3755cecaadccbb7b56a8c6a0aa4e0fe ; (260422)
	bblanchon/ArduinoJson @ ^7.4.2
lib_ignore = 
	NimBLE-Arduino-2.5.0
build_flags =
;   -DDEBUG
	-DFASTLED_DEBUG=1
;	-DFASTLED_LOG_RMT_ENABLED=0
	-DCORE_DEBUG_LEVEL=0
	-DLOG_LOCAL_LEVEL=ESP_LOG_VERBOSE
	-I $PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/SPI/src

[env:esp32-p4]
board = esp32-p4-evboard
# FlowFieldsModule.cpp is the library shim — exclude from firmware build
# (main.cpp already includes flowFieldsEngine.hpp directly)
build_src_filter = +<**/*> -<FlowFieldsModule.cpp>
board_build.flash_mode = qio
board_build.flash_size = 32MB
board_upload.flash_size = 32MB
board_build.partitions = partitions.csv
check_skip_packages = yes
lib_deps =
	${env.lib_deps}
	h2zero/esp-nimble-cpp @ 2.5.0
lib_ignore =              BLE
                          BluetoothSerial
                          SimpleBLE
                          WiFiProv
                          ArduinoOTA
build_flags =
	${env.build_flags}
	-DBOARD_HAS_PSRAM
	-DCONFIG_BT_ENABLED
	-I $PROJECT_PACKAGES_DIR/framework-arduinoespressif32-libs/esp32p4/include/bt/host/nimble/nimble/porting/nimble/include
	-O2
;	-DFASTLED_DISABLE_DBG=0
;	-DFASTLED_FORCE_DBG=1
;   -DFASTLED_LOG_PARLIO_ENABLED=1
